services:
  - type: web
    name: pulsegrid-xuxudong31
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production
      - key: MINIMAX_API_KEY
        sync: false
      - key: MINIMAX_MODEL
        value: MiniMax-M3
      - key: MINIMAX_BASE_URL
        value: https://api.minimaxi.com/v1
      - key: DATABASE_URL
        fromDatabase:
          name: pulsegrid-analytics
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: ANALYTICS_TIME_ZONE
        value: Asia/Shanghai

databases:
  - name: pulsegrid-analytics
    plan: free
    region: singapore
    databaseName: pulsegrid_analytics
